name: baemin-monitoring

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC 01:00)
    - cron: '0 4 * * *'   # 매일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Diagnostics
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "& ''{0}''"'
        run: |
          $pyPath = "C:\Users\woowahan\AppData\Local\Python\bin\python.exe"
          Write-Output "Python exists: $(Test-Path $pyPath)"
          & $pyPath --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install dependencies
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "& ''{0}''"'
        working-directory: C:\baemin
        run: |
          & "C:\Users\woowahan\AppData\Local\Python\bin\pip.exe" install -r requirements.txt --quiet
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run monitoring (main.py)
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "& ''{0}''"'
        working-directory: C:\baemin
        run: |
          $pyPath = "C:\Users\woowahan\AppData\Local\Python\bin\python.exe"
          $outFile = "C:\baemin_runner\ga_main_out.txt"
          $errFile = "C:\baemin_runner\ga_main_err.txt"
          Remove-Item $outFile, $errFile -ErrorAction SilentlyContinue
          $proc = Start-Process $pyPath `
            -ArgumentList "main.py" `
            -WorkingDirectory "C:\baemin" `
            -RedirectStandardOutput $outFile `
            -RedirectStandardError $errFile `
            -NoNewWindow -PassThru -Wait
          if (Test-Path $outFile) { Get-Content $outFile }
          if (Test-Path $errFile) { Get-Content $errFile }
          exit $proc.ExitCode

      - name: Run AI analysis (run_with_ai.py)
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "& ''{0}''"'
        working-directory: C:\baemin
        env:
          ENABLE_AI: "true"
        run: |
          $pyPath = "C:\Users\woowahan\AppData\Local\Python\bin\python.exe"
          $outFile = "C:\baemin_runner\ga_ai_out.txt"
          $errFile = "C:\baemin_runner\ga_ai_err.txt"
          Remove-Item $outFile, $errFile -ErrorAction SilentlyContinue
          $proc = Start-Process $pyPath `
            -ArgumentList "run_with_ai.py" `
            -WorkingDirectory "C:\baemin" `
            -RedirectStandardOutput $outFile `
            -RedirectStandardError $errFile `
            -NoNewWindow -PassThru -Wait
          if (Test-Path $outFile) { Get-Content $outFile }
          if (Test-Path $errFile) { Get-Content $errFile }
          exit $proc.ExitCode
