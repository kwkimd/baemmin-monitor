name: baemin-monitoring

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC 01:00)
    - cron: '0 4 * * *'   # 매일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Python check
        shell: 'C:\Windows\System32\cmd.exe /c "{0}"'
        run: C:\Users\woowahan\AppData\Local\Python\bin\python.exe --version

      - name: Install dependencies
        shell: 'C:\Windows\System32\cmd.exe /c "{0}"'
        run: C:\Users\woowahan\AppData\Local\Python\bin\pip.exe install -r requirements.txt --quiet

      - name: Run monitoring (main.py)
        working-directory: C:\baemin
        shell: 'C:\Windows\System32\cmd.exe /c "{0}"'
        run: C:\Users\woowahan\AppData\Local\Python\bin\python.exe main.py

      - name: Run AI analysis (run_with_ai.py)
        working-directory: C:\baemin
        shell: 'C:\Windows\System32\cmd.exe /c "{0}"'
        env:
          ENABLE_AI: "true"
        run: C:\Users\woowahan\AppData\Local\Python\bin\python.exe run_with_ai.py
