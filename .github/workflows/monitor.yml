name: baemin-monitoring

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC 01:00)
    - cron: '0 4 * * *'   # 매일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted   # 로컬 PC에서 실행 (봇 차단 우회)
    timeout-minutes: 30

    steps:
      - name: 의존성 확인 및 설치
        working-directory: C:\배민모니터링
        run: pip install -r requirements.txt --quiet

      - name: 크롤링 실행 (main.py)
        working-directory: C:\배민모니터링
        run: python main.py

      - name: AI 분석 및 HTML 업로드 (run_with_ai.py)
        working-directory: C:\배민모니터링
        env:
          ENABLE_AI: "true"
        run: python run_with_ai.py
