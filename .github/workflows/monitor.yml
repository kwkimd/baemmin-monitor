name: 배민외식업광장 모니터링

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 평일 오전 10시 KST (UTC 01:00)
    - cron: '0 4 * * 1-5'   # 평일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  monitor:
    runs-on: self-hosted      # 로컬 Windows PC 실행 (봇 차단 우회)
    timeout-minutes: 20

    steps:
      - name: Env Diagnostic
        shell: 'C:\Windows\System32\cmd.exe /D /E:ON /V:OFF /S /C "{0}"'
        run: echo RUNNER_OK > C:\baemin_runner\runner_test.txt && echo PATH=%PATH% >> C:\baemin_runner\runner_test.txt

      - name: Step 1 - 모니터링 크롤링
        shell: 'C:\Windows\System32\cmd.exe /D /E:ON /V:OFF /S /C "{0}"'
        run: C:\baemin_runner\step1.bat

      - name: Step 2 - AI 분석 및 HTML 생성 (GitHub Pages 업로드 포함)
        shell: 'C:\Windows\System32\cmd.exe /D /E:ON /V:OFF /S /C "{0}"'
        env:
          ENABLE_AI: "true"
        run: C:\baemin_runner\step2.bat
