name: baemin-monitoring

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC 01:00)
    - cron: '0 4 * * *'   # 매일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Python check
        working-directory: C:\baemin
        run: python --version

      - name: Install dependencies
        working-directory: C:\baemin
        run: pip install -r requirements.txt --quiet

      - name: Run monitoring (main.py)
        working-directory: C:\baemin
        run: python main.py

      - name: Run AI analysis (run_with_ai.py)
        working-directory: C:\baemin
        env:
          ENABLE_AI: "true"
        run: python run_with_ai.py
