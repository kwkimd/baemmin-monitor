name: baemin-monitoring

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC 01:00)
    - cron: '0 4 * * *'   # 매일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted   # 로컬 PC에서 실행 (봇 차단 우회)
    timeout-minutes: 30

    defaults:
      run:
        shell: pwsh

    steps:
      - name: 환경 진단 (경로·Python 확인)
        run: |
          Write-Host "현재 위치: $(Get-Location)"
          Set-Location "C:\배민모니터링"
          Write-Host "이동 후 위치: $(Get-Location)"
          python --version
          pip --version
          Get-ChildItem . -Name | Select-Object -First 5

      - name: 의존성 확인 및 설치
        run: |
          Set-Location "C:\배민모니터링"
          pip install -r requirements.txt --quiet

      - name: 크롤링 실행 (main.py)
        run: |
          Set-Location "C:\배민모니터링"
          python main.py

      - name: AI 분석 및 HTML 업로드 (run_with_ai.py)
        env:
          ENABLE_AI: "true"
        run: |
          Set-Location "C:\배민모니터링"
          python run_with_ai.py
