name: baemin-monitoring

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC 01:00)
    - cron: '0 4 * * *'   # 매일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Diagnostics
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "& ''{0}''"'
        run: |
          $pyPath = "C:\Users\woowahan\AppData\Local\Python\pythoncore-3.14-64\python.exe"
          Write-Output "Python exists: $(Test-Path $pyPath)"
          $p = Start-Process -FilePath $pyPath -ArgumentList "--version" -Wait -NoNewWindow -PassThru
          Write-Output "Python exit: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { exit $p.ExitCode }

      - name: Install dependencies
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "& ''{0}''"'
        working-directory: C:\baemin
        run: |
          $pipPath = "C:\Users\woowahan\AppData\Local\Python\bin\pip.exe"
          $p = Start-Process -FilePath $pipPath -ArgumentList "install", "-r", "requirements.txt", "--quiet" -Wait -NoNewWindow -PassThru
          if ($p.ExitCode -ne 0) { exit $p.ExitCode }

      - name: Run monitoring (main.py)
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "& ''{0}''"'
        working-directory: C:\baemin
        run: |
          $pyPath = "C:\Users\woowahan\AppData\Local\Python\pythoncore-3.14-64\python.exe"
          Write-Output "[DIAG] pyPath=$pyPath exists=$(Test-Path $pyPath)"
          Write-Output "[DIAG] start=$(Get-Date -Format 'HH:mm:ss.fff')"
          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = $pyPath
          $psi.Arguments = "-u `"C:\baemin_runner\run_main.py`""
          $psi.UseShellExecute = $false
          $p = [System.Diagnostics.Process]::Start($psi)
          if ($null -eq $p) { Write-Output "[DIAG] Process.Start returned null!"; exit 1 }
          Write-Output "[DIAG] PID=$($p.Id)"
          $p.WaitForExit()
          $exitCode = $p.ExitCode
          Write-Output "[DIAG] exit=$exitCode time=$(Get-Date -Format 'HH:mm:ss.fff')"
          Write-Output "--- stdout ---"
          if (Test-Path "C:\baemin_runner\ga_main_out.txt") { Get-Content "C:\baemin_runner\ga_main_out.txt" }
          Write-Output "--- stderr ---"
          if (Test-Path "C:\baemin_runner\ga_main_err.txt") { Get-Content "C:\baemin_runner\ga_main_err.txt" }
          exit $exitCode

      - name: Run AI analysis (run_with_ai.py)
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "& ''{0}''"'
        working-directory: C:\baemin
        env:
          ENABLE_AI: "true"
        run: |
          $pyPath = "C:\Users\woowahan\AppData\Local\Python\pythoncore-3.14-64\python.exe"
          $p = Start-Process -FilePath $pyPath -ArgumentList "-u", "C:\baemin_runner\run_ai.py" -Wait -NoNewWindow -PassThru
          $exitCode = $p.ExitCode
          Write-Output "--- stdout ---"
          if (Test-Path "C:\baemin_runner\ga_ai_out.txt") { Get-Content "C:\baemin_runner\ga_ai_out.txt" }
          Write-Output "--- stderr ---"
          if (Test-Path "C:\baemin_runner\ga_ai_err.txt") { Get-Content "C:\baemin_runner\ga_ai_err.txt" }
          exit $exitCode
