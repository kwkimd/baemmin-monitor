name: baemin-monitoring

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC 01:00)
    - cron: '0 4 * * *'   # 매일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Diagnostics
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -File "{0}"'
        run: |
          Write-Output "PATH=$env:PATH"
          $pyPath = "C:\Users\woowahan\AppData\Local\Python\bin\python.exe"
          Write-Output "Python exists: $(Test-Path $pyPath)"
          & $pyPath --version

      - name: Install dependencies
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -File "{0}"'
        working-directory: C:\baemin
        run: |
          & "C:\Users\woowahan\AppData\Local\Python\bin\pip.exe" install -r requirements.txt --quiet

      - name: Run monitoring (main.py)
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -File "{0}"'
        working-directory: C:\baemin
        run: |
          & "C:\Users\woowahan\AppData\Local\Python\bin\python.exe" main.py

      - name: Run AI analysis (run_with_ai.py)
        shell: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NonInteractive -NoLogo -NoProfile -ExecutionPolicy Bypass -File "{0}"'
        working-directory: C:\baemin
        env:
          ENABLE_AI: "true"
        run: |
          & "C:\Users\woowahan\AppData\Local\Python\bin\python.exe" run_with_ai.py
