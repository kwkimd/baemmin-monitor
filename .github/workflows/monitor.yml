name: baemin-monitoring

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 평일 오전 10시 KST (UTC 01:00)
    - cron: '0 4 * * 1-5'   # 평일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Chrome 버전 확인
        run: google-chrome --version

      - name: config.json 생성 (Secrets에서)
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import json, os
          config = {
              'spreadsheet_id': os.environ['SPREADSHEET_ID'],
              'target_url': 'https://ceo.baemin.com',
              'github_token': os.environ['GH_PAT'],
              'github_repo': 'kwkimd/baemmin-monitor',
              'gemini_api_key': os.environ['GEMINI_API_KEY']
          }
          with open('config.json', 'w') as f:
              json.dump(config, f, indent=2)
          print('config.json 생성 완료')
          "

      - name: credentials.json 복원 (Base64 Secret에서)
        run: |
          echo '${{ secrets.CREDENTIALS_JSON }}' | base64 -d > credentials.json

      - name: 크롤링 실행 (main.py)
        run: python3 main.py

      - name: AI 분석 및 HTML 업로드 (run_with_ai.py)
        env:
          ENABLE_AI: "true"
        run: python3 run_with_ai.py
