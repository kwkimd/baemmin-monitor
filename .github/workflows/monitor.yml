name: baemin-monitoring

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC 01:00)
    - cron: '0 4 * * *'   # 매일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Diagnostics
        shell: cmd
        run: |
          SET pyPath=C:\Users\woowahan\AppData\Local\Python\pythoncore-3.14-64\python.exe
          echo Python path: %pyPath%
          "%pyPath%" --version

      - name: Install dependencies
        shell: cmd
        working-directory: C:\baemin
        run: |
          SET pyPath=C:\Users\woowahan\AppData\Local\Python\pythoncore-3.14-64\python.exe
          "%pyPath%" -m pip install -r requirements.txt --quiet
          if %errorlevel% neq 0 exit /b %errorlevel%

      - name: Run monitoring (main.py)
        shell: cmd
        working-directory: C:\baemin
        run: |
          SET pyPath=C:\Users\woowahan\AppData\Local\Python\pythoncore-3.14-64\python.exe
          echo [DIAG] start=%TIME%
          "%pyPath%" -u "C:\baemin_runner\run_main.py"
          SET exitCode=%errorlevel%
          echo [DIAG] exit=%exitCode% time=%TIME%
          echo --- stdout ---
          if exist "C:\baemin_runner\ga_main_out.txt" type "C:\baemin_runner\ga_main_out.txt"
          echo --- stderr ---
          if exist "C:\baemin_runner\ga_main_err.txt" type "C:\baemin_runner\ga_main_err.txt"
          exit /b %exitCode%

      - name: Run AI analysis (run_with_ai.py)
        shell: cmd
        working-directory: C:\baemin
        env:
          ENABLE_AI: "true"
        run: |
          SET pyPath=C:\Users\woowahan\AppData\Local\Python\pythoncore-3.14-64\python.exe
          "%pyPath%" -u "C:\baemin_runner\run_ai.py"
          SET exitCode=%errorlevel%
          echo --- stdout ---
          if exist "C:\baemin_runner\ga_ai_out.txt" type "C:\baemin_runner\ga_ai_out.txt"
          echo --- stderr ---
          if exist "C:\baemin_runner\ga_ai_err.txt" type "C:\baemin_runner\ga_ai_err.txt"
          exit /b %exitCode%
