<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배민외식업광장 모니터링 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 헤더 */
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header .update-time {
            color: #666;
            font-size: 14px;
        }
        
        .header .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 10px;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
        
        /* 버전 선택 */
        .version-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 10px;
        }
        
        .version-selector label {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
        }
        
        .version-selector select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 200px;
        }
        
        .version-selector select:hover {
            border-color: #667eea;
        }
        
        /* 🚨 알림 섹션 */
        .alert-section {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            box-shadow: 0 5px 20px rgba(238, 90, 90, 0.3);
        }
        
        .alert-header h3 {
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .alert-table-wrapper {
            overflow-x: auto;
        }
        
        .alert-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        .alert-table th,
        .alert-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .alert-table th {
            background: rgba(0,0,0,0.1);
            font-weight: 600;
        }
        
        .alert-table tr:hover {
            background: rgba(0,0,0,0.1);
        }
        
        .alert-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .alert-critical {
            background: #fff;
            color: #c53030;
        }
        
        .alert-warning {
            background: #fef3c7;
            color: #92400e;
        }
        
        .alert-error {
            background: #fecaca;
            color: #991b1b;
        }
        
        /* 확인 필요 섹션 */
        .need-check-section {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .need-check-header {
            margin-bottom: 15px;
        }
        
        .need-check-header h3 {
            color: #c53030;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tooltip-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: #c53030;
            color: white;
            border-radius: 50%;
            font-size: 11px;
            cursor: help;
            position: relative;
        }
        
        .tooltip-icon:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            top: 25px;
            left: 0;
            background: #333;
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 12px;
            white-space: pre-line;
            min-width: 280px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            line-height: 1.6;
        }
        
        .need-check-table-wrapper {
            overflow-x: auto;
        }
        
        .need-check-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .need-check-table th,
        .need-check-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #fed7d7;
        }
        
        .need-check-table th {
            background: #feb2b2;
            color: #742a2a;
            font-weight: 500;
        }
        
        .need-check-table tr:hover {
            background: #fff0f0;
        }
        
        /* 통계 카드 */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .stat-card .number {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-card .label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        .stat-card.warning .number {
            color: #e53e3e;
        }
        
        /* 영역 카드 */
        .areas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .area-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .area-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .area-header h3 {
            font-size: 16px;
            font-weight: 500;
        }
        
        .count-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
        }
        
        .area-items {
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .item {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .item:last-child {
            border-bottom: none;
        }
        
        .item-main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 5px;
        }
        
        .item-title {
            flex: 1;
            font-size: 13px;
            color: #333;
            text-decoration: none;
            line-height: 1.4;
            word-break: break-word;
        }
        
        .item-title:hover {
            color: #667eea;
        }
        
        .item-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }
        
        /* AI 제안 스타일 */
        .ai-suggestions-container {
            margin-top: 8px;
        }
        
        .ai-toggle-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
        }
        
        .ai-toggle-btn:hover {
            transform: scale(1.05);
        }
        
        .ai-content {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9ff;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }
        
        .ai-suggestion {
            background: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .ai-suggestion:last-child {
            margin-bottom: 0;
        }
        
        .ai-sug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .ai-badge {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .ai-score {
            background: #ffd700;
            color: #333;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .ai-title {
            font-size: 12px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
            line-height: 1.4;
        }
        
        .ai-reason {
            font-size: 11px;
            color: #666;
            line-height: 1.4;
        }
        
        .status-ok {
            background: #d4edda;
            color: #155724;
        }
        
        .status-warn {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        
        /* 푸터 */
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            padding: 30px;
            font-size: 13px;
        }
        
        /* 스크롤바 */
        .area-items::-webkit-scrollbar {
            width: 6px;
        }
        
        .area-items::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .area-items::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        
        /* 반응형 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }
            
            .header-top {
                flex-direction: column;
            }
            
            .areas {
                grid-template-columns: 1fr;
            }
            
            .stat-card .number {
                font-size: 28px;
            }
            
            .version-selector {
                width: 100%;
            }
            
            .version-selector select {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="header">
            <div class="header-top">
                <div>

                    <p class="update-time">📅 마지막 업데이트: 2026-02-25 10:56:28 (KST)</p>

    </div>

        <!-- 🚨 영역 노출 알림 -->
        
        
        <!-- 확인 필요 항목 -->
        
        
        <!-- 통계 -->
        <div class="stats">
            <div class="stat-card">
                <div class="number">0</div>
                <div class="label">총 수집 항목</div>
            </div>
            <div class="stat-card">
                <div class="number">0</div>
                <div class="label">모니터링 영역</div>
            </div>
            <div class="stat-card">
                <div class="number">0</div>
                <div class="label">정상 링크</div>
            </div>
            <div class="stat-card ">
                <div class="number">0</div>
                <div class="label">확인 필요</div>
            </div>
        </div>
        
        <!-- 영역별 카드 -->
        <div class="areas">
            
        </div>
        
        <!-- 푸터 -->
        <div class="footer">
            <p>배민외식업광장 자동 모니터링 시스템</p>
            <p>Powered by Python + Selenium + GitHub Pages</p>
        </div>
    </div>
    
    <script>
        function changeVersion(version) {
            if (version) {
                var base = 'https://kwkimd.github.io/baemmin-monitor/';
                if (base) {
                    window.location.href = base + 'versions/' + version + '.html';
                } else {
                    window.location.href = 'versions/' + version + '.html';
                }
            }
        }
        
        function toggleAI(btn) {
            const content = btn.nextElementSibling;
            if (content.style.display === 'none') {
                content.style.display = 'block';
                btn.textContent = '🔼 AI 제안 숨기기';
            } else {
                content.style.display = 'none';
                btn.textContent = '💡 AI 제안 보기';
            }
        }
    </script>
</body>
</html>
